# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ master, release, development ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        lfs: 'true'
    - name: Set up JDK 24
      uses: actions/setup-java@v5
      with:
        java-version: '24'
        distribution: 'temurin'
    - name: Set Git user
      run: |
        git config --global committer.email "noreply@github.com"
        git config --global committer.name "GitHub"
        git config --global author.email "${GITHUB_ACTOR}@users.noreply.github.com"
        git config --global author.name "${GITHUB_ACTOR}"
    - name: Set Release version env variable
      env:
        USERNAME: ${{ github.actor }}
        PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "RELEASE_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout | tr -d '\n')" >> $GITHUB_ENV
    - name: Restore Maven cache
      uses: skjolber/maven-cache-github-action@v3.1.2
      with:
        step: restore
    - name: Build with Maven
      env:
        USERNAME: ${{ github.actor }}
        PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      run: ./mvnw -B package --file pom.xml
    - name: Publish Unit Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: "**/*-reports/*.xml"
    - name: Publish to GitHub Packages
      run: ./mvnw --batch-mode -DskipTests -Pgithub-snapshot deploy
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - uses: jfrog/setup-jfrog-cli@v4
      env:
        JF_URL: https://m.lifs-tools.org/
        JF_USER: github-deployer
        JF_PASSWORD: ${{ secrets.ARTIFACTORY_TOKEN }}
    - name: maven build
      run: |
            jf mvn-config --repo-deploy-releases=lifs-libs-release-local --repo-deploy-snapshots=lifs-libs-snapshot-local
            jf mvn -B deploy -DskipTests -Pjfrog --file pom.xml
            jf rt bp
    - name: Upload CLI distribution zip
      uses: actions/upload-artifact@v4
      with:
        name: jmztabm-cli-dist
        path: cli/target/jmztabm-cli-*-bin.zip
        if-no-files-found: error
    - name: Save Maven cache
      uses: skjolber/maven-cache-github-action@v3.1.2
      with:
        step: save

  native:
    name: Native binary (${{ matrix.platform }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: aarch64-macos
            binary: jmztabm-validator
          - os: ubuntu-latest
            platform: amd64-linux
            binary: jmztabm-validator
          - os: windows-latest
            platform: amd64-windows
            binary: jmztabm-validator.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: 'true'
      - name: Set up GraalVM JDK 24
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'
      - name: Restore Maven cache
        uses: skjolber/maven-cache-github-action@v3.1.2
        with:
          step: restore
      - name: Build native binary
        shell: bash
        run: ./mvnw -B -pl cli -am package -Pnative -DskipTests --file pom.xml
      - name: Save Maven cache
        uses: skjolber/maven-cache-github-action@v3.1.2
        with:
          step: save
      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: jmztabm-validator-${{ matrix.platform }}
          path: cli/target/${{ matrix.binary }}
          if-no-files-found: error
